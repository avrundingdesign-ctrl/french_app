name: FrenchApp
options:
  bundleIdPrefix: design.avrunding
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"

targets:
  FrenchApp:
    type: application
    platform: iOS
    sources:
      - path: FrenchApp
    info:
      path: FrenchApp/Info.plist
      properties:
        CFBundleDisplayName: Français
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: design.avrunding.frenchapp
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  FrenchAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FrenchAppTests
    dependencies:
      - target: FrenchApp

schemes:
  FrenchApp:
    build:
      targets:
        FrenchApp: all
        FrenchAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - FrenchAppTests
