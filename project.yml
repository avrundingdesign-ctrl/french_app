name: FrenchApp
options:
  bundleIdPrefix: design.avrunding
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  # Deutsch ist Entwicklungssprache (Keys = deutsche Texte),
  # Französisch kommt als Übersetzung im String-Katalog dazu.
  developmentLanguage: de

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    SWIFT_EMIT_LOC_STRINGS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES

targets:
  FrenchApp:
    type: application
    platform: iOS
    sources:
      - path: FrenchApp
    info:
      path: FrenchApp/Info.plist
      properties:
        CFBundleDisplayName: Français
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: design.avrunding.frenchapp
        CODE_SIGN_ENTITLEMENTS: FrenchApp/FrenchApp.entitlements
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  FrenchAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FrenchAppTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: FrenchApp

schemes:
  FrenchApp:
    build:
      targets:
        FrenchApp: all
        FrenchAppTests: [test]
    run:
      config: Debug
      # Lokales StoreKit-Testing (Paywall im Simulator ohne App Store Connect).
      storeKitConfiguration: Configuration.storekit
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - FrenchAppTests
